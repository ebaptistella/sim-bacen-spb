<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Simulador BACEN - SPB</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'indigo-500': '#667eea',
            'purple-600': '#764ba2',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen p-5">
  <div id="app"></div>
  <script src="/js/app.js"></script>
  <script>
    (function runApp(retries) {
      retries = retries || 0;
      var ns = window.com && window.com.github && window.com.github.ebaptistella && window.com.github.ebaptistella.ui && window.com.github.ebaptistella.ui.core;
      var init = typeof window.__spb_init__ === 'function' ? window.__spb_init__ : (ns && ns.init);
      if (init) {
        try { init(); return; } catch (e) { console.error('spb init error', e); }
      }
      if (retries < 50) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () { runApp(retries + 1); });
        } else {
          setTimeout(function () { runApp(retries + 1); }, 100);
        }
      }
    })();
  </script>
</body>

</html>
