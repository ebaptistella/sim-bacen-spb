services:

  # ---------------------------------------------------------------------------
  # IBM MQ — broker de mensagens SPB
  # ---------------------------------------------------------------------------
  ibmmq:
    image: icr.io/ibm-messaging/mq:latest
    platform: linux/amd64
    container_name: ibmmq
    restart: unless-stopped
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: ${IBMMQ_QMGR_NAME}
      MQ_APP_PASSWORD: ${IBMMQ_APP_PASSWORD}
      MQ_ADMIN_PASSWORD: ${IBMMQ_ADMIN_PASSWORD}
    ports:
      - "1414:1414"   # MQ listener
      - "9443:9443"   # Web admin console
    volumes:
      - ibmmq-data:/mnt/mqm
      - ./ibmmq/20-spb-queues.mqsc:/etc/mqm/20-spb-queues.mqsc
    networks:
      - spb-net
      - spb-network

  # ---------------------------------------------------------------------------
  # Backend — API Clojure/Pedestal
  # Porta 3000 exposta no host para debug; em produção pode ser removida.
  # Variáveis de ambiente sobrescrevem a config IBM MQ do application.edn.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    environment:
      SIMULATOR_ISPB: ${SIMULATOR_ISPB:-00038166}
      IBMMQ_HOST: ${IBMMQ_HOST:-ibmmq}
      IBMMQ_PORT: ${IBMMQ_PORT:-1414}
      IBMMQ_CHANNEL: ${IBMMQ_CHANNEL:-DEV.APP.SVRCONN}
      IBMMQ_QMGR_NAME: ${IBMMQ_QMGR_NAME:-QM1}
      IBMMQ_USER: ${IBMMQ_USER:-app}
      IBMMQ_PASSWORD: ${IBMMQ_PASSWORD:-app@mq123}
      IBMMQ_QL_REQ_NAME: ${IBMMQ_QL_REQ_NAME:-QR.REQ.08253539.00038166.01}
      IBMMQ_QL_RSP_NAME: ${IBMMQ_QL_RSP_NAME:-QR.RSP.00038166.08253539.01}
      IBMMQ_QL_REP_NAME: ${IBMMQ_QL_REP_NAME:-QL.REP.00038166.08253539.01}
    ports:
      - "3000:3000"
    depends_on:
      ibmmq:
        condition: service_started
    networks:
      - spb-net
      - spb-network

  # ---------------------------------------------------------------------------
  # Frontend — SPA ClojureScript/Reagent servida via nginx
  # Nginx também proxia /api/ para o backend (mesmo origin, sem CORS).
  # Porta host: 8080
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - spb-net
      - spb-network

networks:
  spb-net:
    driver: bridge
  spb-network:
    name: spb-network
    external: true

volumes:
  ibmmq-data:
    driver: local
